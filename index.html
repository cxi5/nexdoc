<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NexDoc</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="nexdoc.css">
</head>
<body>

<header class="topbar">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="12" y2="17"/></svg>
    </div>
    <div>
      <div class="brand-name">NexDoc</div>
    </div>
  </div>
  <span id="topbarTitle" class="topbar-title" style="display:none"></span>
</header>

<div class="content">

  <!-- ══ PAINEL ══ -->
  <section id="view-dashboard">
    <div class="kpi-strip">
      <div class="kpi-card"><span class="kpi-num" id="kpiTotal">0</span><div class="kpi-label">Total</div></div>
      <div class="kpi-card"><span class="kpi-num" id="kpiRascunho">0</span><div class="kpi-label">Rascunhos</div></div>
      <div class="kpi-card"><span class="kpi-num" id="kpiPendente">0</span><div class="kpi-label">Pendentes</div></div>
      <div class="kpi-card"><span class="kpi-num" id="kpiAssinado">0</span><div class="kpi-label">Assinados</div></div>
    </div>
    <div class="section-row"><h2>Recentes</h2></div>
    <div id="dashboardList"></div>
  </section>

  <!-- ══ ARQUIVO ══ -->
  <section id="view-archive" style="display:none">
    <div class="section-row">
      <h2>Arquivo</h2>
      <div class="search-wrap">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.6" y2="16.6"/></svg>
        <input type="text" id="archiveSearch" placeholder="Procurar…" oninput="renderArchive()">
      </div>
    </div>
    <div id="archiveList"></div>
  </section>

  <!-- ══ EDITOR ══ -->
  <section id="view-editor" style="display:none">
    <div class="editor-header">
      <h2 id="editorHeading">Novo contrato</h2>
    </div>

    <!-- IMPORTAR FICHEIRO -->
    <div class="import-area" onclick="document.getElementById('importFileInput').click()" id="importZone">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <p>Carregar ficheiro do dispositivo<br><strong>HTML, TXT, DOC</strong> — para editar aqui</p>
    </div>
    <input type="file" id="importFileInput" accept=".html,.htm,.txt,.doc,.docx" onchange="importFile(event)">

    <div class="meta-grid">
      <div class="field">
        <label>Título</label>
        <input type="text" id="fTitle" placeholder="Título do contrato">
      </div>
      <div class="meta-row">
        <div class="field">
          <label>Tipo</label>
          <select id="fType">
            <option>Prestação de Serviços</option>
            <option>Acordo de Confidencialidade</option>
            <option>Arrendamento</option>
            <option>Compra e Venda</option>
            <option>Contrato de Trabalho</option>
            <option>Procuração</option>
            <option>Outro</option>
          </select>
        </div>
        <div class="field">
          <label>Valor (Kz)</label>
          <input type="number" id="fValue" placeholder="0" min="0">
        </div>
      </div>
      <div class="meta-row">
        <div class="field">
          <label>1.º Outorgante</label>
          <input type="text" id="fPartyA" placeholder="Nome / empresa">
        </div>
        <div class="field">
          <label>2.º Outorgante</label>
          <input type="text" id="fPartyB" placeholder="Nome / empresa">
        </div>
      </div>
    </div>

    <!-- TOOLBAR ESTILO WORD -->
    <div class="toolbar-wrap">
      <div class="toolbar-row1">
        <button class="tb-btn tb-btn-text" onclick="cmd('bold')" title="Negrito"><b>N</b></button>
        <button class="tb-btn tb-btn-text" onclick="cmd('italic')" title="Itálico"><i>I</i></button>
        <button class="tb-btn tb-btn-text" onclick="cmd('underline')" title="Sublinhado"><u>S</u></button>
        <button class="tb-btn" onclick="cmd('strikeThrough')" title="Rasurado">
          <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><path d="M16 6C16 6 14.5 4 12 4C9.5 4 7 5.5 7 8C7 10.5 9 11.5 12 12"/><path d="M8 17C8 17 9.5 20 12 20C14.5 20 17 18.5 17 16C17 14.5 16 13.5 14 13"/></svg>
        </button>
        <div class="tb-sep"></div>
        <select class="tb-select" onchange="cmd('formatBlock', this.value); this.value=''" title="Estilo">
          <option value="">Estilo…</option>
          <option value="p">Parágrafo</option>
          <option value="h1">Título 1</option>
          <option value="h2">Título 2</option>
          <option value="h3">Título 3</option>
          <option value="blockquote">Citação</option>
          <option value="pre">Código</option>
        </select>
        <div class="tb-sep"></div>
        <select class="tb-select" onchange="cmd('fontName', this.value)" title="Tipo de letra">
          <option value="Inter">Padrão (Inter)</option>
          <option value="Instrument Serif">Clássica</option>
          <option value="JetBrains Mono">Mono</option>
          <option value="Georgia">Georgia</option>
          <option value="Arial">Arial</option>
          <option value="Times New Roman">Times New Roman</option>
        </select>
        <select class="tb-select" onchange="cmd('fontSize', this.value)" title="Tamanho">
          <option value="1">8pt</option>
          <option value="2">10pt</option>
          <option value="3" selected>12pt</option>
          <option value="4">14pt</option>
          <option value="5">18pt</option>
          <option value="6">24pt</option>
          <option value="7">36pt</option>
        </select>
      </div>
      <div class="toolbar-row2">
        <button class="tb-btn" onclick="cmd('justifyLeft')" title="Alinhar à esquerda">
          <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="18" y2="18"/></svg>
        </button>
        <button class="tb-btn" onclick="cmd('justifyCenter')" title="Centrar">
          <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="6" y1="12" x2="18" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
        </button>
        <button class="tb-btn" onclick="cmd('justifyRight')" title="Alinhar à direita">
          <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="9" y1="12" x2="21" y2="12"/><line x1="6" y1="18" x2="21" y2="18"/></svg>
        </button>
        <button class="tb-btn" onclick="cmd('justifyFull')" title="Justificar">
          <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="tb-sep"></div>
        <button class="tb-btn" onclick="cmd('insertUnorderedList')" title="Lista com marcadores">
          <svg viewBox="0 0 24 24"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4" cy="6" r="1.2" fill="currentColor" stroke="none"/><circle cx="4" cy="12" r="1.2" fill="currentColor" stroke="none"/><circle cx="4" cy="18" r="1.2" fill="currentColor" stroke="none"/></svg>
        </button>
        <button class="tb-btn" onclick="cmd('insertOrderedList')" title="Lista numerada">
          <svg viewBox="0 0 24 24"><line x1="10" y1="6" x2="20" y2="6"/><line x1="10" y1="12" x2="20" y2="12"/><line x1="10" y1="18" x2="20" y2="18"/><path d="M4 8V4l-1.5 1" stroke-linecap="round"/><path d="M3 14h2l-2 4h2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="tb-btn" onclick="cmd('outdent')" title="Diminuir avanço">
          <svg viewBox="0 0 24 24"><polyline points="11 17 6 12 11 7"/><line x1="13" y1="6" x2="21" y2="6"/><line x1="13" y1="12" x2="21" y2="12"/><line x1="13" y1="18" x2="21" y2="18"/></svg>
        </button>
        <button class="tb-btn" onclick="cmd('indent')" title="Aumentar avanço">
          <svg viewBox="0 0 24 24"><polyline points="13 17 18 12 13 7"/><line x1="3" y1="6" x2="11" y2="6"/><line x1="3" y1="12" x2="11" y2="12"/><line x1="3" y1="18" x2="11" y2="18"/></svg>
        </button>
        <div class="tb-sep"></div>
        <button class="tb-btn" onclick="insertHR()" title="Linha horizontal">
          <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/></svg>
        </button>
        <button class="tb-btn" onclick="insertLink()" title="Inserir hiperligação">
          <svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
        </button>
        <button class="tb-btn" onclick="cmd('removeFormat')" title="Limpar formatação">
          <svg viewBox="0 0 24 24"><line x1="4" y1="7" x2="14" y2="7"/><line x1="9" y1="4" x2="9" y2="14"/><line x1="3" y1="20" x2="21" y2="20"/><line x1="16" y1="4" x2="21" y2="14"/><line x1="21" y1="4" x2="16" y2="14"/></svg>
        </button>
        <div class="tb-sep"></div>
        <button class="tb-btn" onclick="cmd('undo')" title="Desfazer">
          <svg viewBox="0 0 24 24"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 00-4-4H4"/></svg>
        </button>
        <button class="tb-btn" onclick="cmd('redo')" title="Refazer">
          <svg viewBox="0 0 24 24"><polyline points="15 14 20 9 15 4"/><path d="M4 20v-7a4 4 0 014-4h12"/></svg>
        </button>
        <div class="tb-sep"></div>
        <label class="tb-btn" title="Cor do texto" style="position:relative">
          <svg viewBox="0 0 24 24"><path d="M4 20h4l10.5-10.5a2 2 0 000-2.83l-1.17-1.17a2 2 0 00-2.83 0L4 16v4z"/><line x1="13.5" y1="6.5" x2="17.5" y2="10.5"/></svg>
          <input type="color" id="txtColor" value="#F0EDE6" oninput="cmd('foreColor', this.value)" style="position:absolute;opacity:0;width:0;height:0">
        </label>
        <label class="tb-btn" title="Cor de fundo" style="position:relative">
          <svg viewBox="0 0 24 24"><path d="M20 11l-8-8-9 9 4 4"/><path d="M5 16l4 4 4-4"/><line x1="2" y1="22" x2="22" y2="22"/></svg>
          <input type="color" id="bgColor" value="#C9A84C" oninput="cmd('hiliteColor', this.value)" style="position:absolute;opacity:0;width:0;height:0">
        </label>
      </div>
    </div>

    <div class="editor-area" id="editorArea" contenteditable="true" spellcheck="true"></div>

    <div class="editor-actions">
      <button class="btn-secondary" onclick="cancelEdit()">Cancelar</button>
      <button class="btn-secondary" onclick="saveDocument('rascunho')">Guardar rascunho</button>
      <button class="btn-primary" onclick="saveDocument('pendente')">Enviar para assinar</button>
    </div>
  </section>

</div>

<!-- ══ NAV ══ -->
<nav class="bottomnav">
  <button class="nav-btn active" data-view="dashboard" onclick="switchView('dashboard')">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
    <span>Painel</span>
  </button>
  <button class="fab" onclick="openEditor(null)" title="Novo contrato">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>
  <button class="nav-btn" data-view="archive" onclick="switchView('archive')">
    <svg viewBox="0 0 24 24"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>
    <span>Arquivo</span>
  </button>
</nav>

<!-- ══ DETAIL SHEET ══ -->
<div class="sheet-overlay" id="sheetOverlay" onclick="handleOverlayClick(event)">
  <div class="sheet" id="sheetPanel"></div>
</div>

<!-- ══ MODAL ══ -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">Confirmar</h3>
    <p id="modalMsg"></p>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-danger btn-secondary" id="modalConfirm">Eliminar</button>
    </div>
  </div>
</div>

<!-- ══ TOAST ══ -->
<div class="toast" id="toast"></div>

<script src="nexdoc.js"></script>
</body>
</html>
